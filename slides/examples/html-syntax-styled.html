<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The World Wide Web project (styled)</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #1f2a44;
      --link: #0b5ed7;
      --accent: #cfe2ff;
      --border: #9ec5fe;
    }

    body {
      margin: 2rem auto;
      max-width: 760px;
      padding: 0 1rem;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    h1 {
      color: #003049;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.4rem;
    }

    h2 {
      color: #1d3557;
      margin-top: 1.5rem;
    }

    ul {
      background: var(--accent);
      border-left: 4px solid var(--border);
      padding: 0.8rem 0.8rem 0.8rem 1.5rem;
    }

    a {
      color: var(--link);
      font-weight: 600;
      text-decoration-thickness: 2px;
    }
  </style>
</head>
<body>
  <h1>World Wide Web</h1>
  <p>The WorldWideWeb (W3) is a wide-area hypermedia information retrieval initiative.</p>

  <h2>What's out there?</h2>
  <ul>
    <li><a href="/hypertext/DataSources/Top.html">Pointers to online information</a></li>
    <li><a href="/hypertext/WWW/Help.html">Help</a> on the browser you are using</li>
    <li><a href="/hypertext/WWW/Status.html">Software products</a></li>
  </ul>

  <p>
    <a href="/hypertext/WWW/People.html">People</a> |
    <a href="/hypertext/WWW/History.html">History</a> |
    <a href="/hypertext/WWW/FAQ/List.html">FAQ</a>
  </p>
</body>
</html>
